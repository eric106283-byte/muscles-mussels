<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>訂單成立 — 肌肉淡菜 Muscles Mussels</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital@1&family=Noto+Sans+TC:wght@300;400;500;700&family=Noto+Serif+TC:wght@700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: oklch(98% 0.007 81); --surface: oklch(100% 0 0); --fg: oklch(29% 0.034 287);
      --muted: oklch(50% 0.03 287); --border: oklch(90% 0.012 287);
      --primary: oklch(51% 0.095 285); --primary-deep: oklch(36% 0.048 289); --primary-soft: oklch(64% 0.083 287);
      --accent: oklch(69% 0.166 51); --accent-deep: oklch(58% 0.155 48);
      --font-display: 'Noto Serif TC', serif; --font-en: 'Cormorant Garamond', serif; --font-body: 'Noto Sans TC', sans-serif;
      --radius-card: 14px; --radius-pill: 100px;
      --shadow-soft: 0 2px 12px oklch(51% 0.095 285 / 0.08);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-family: var(--font-body); color: var(--fg); background: var(--bg); }
    body { min-height: 100vh; display: flex; flex-direction: column; }
    @keyframes page-in { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }
    @keyframes page-out { to { opacity: 0; transform: translateY(-8px); } }
    @keyframes check-draw { from { stroke-dashoffset: 80; } to { stroke-dashoffset: 0; } }
    @keyframes circle-pop { 0% { transform: scale(.5); opacity: 0; } 60% { transform: scale(1.08); } 100% { transform: scale(1); opacity: 1; } }
    @keyframes fade-up { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: none; } }
    body { animation: page-in .28s ease both; }
    body.is-leaving { animation: page-out .2s ease forwards; }
    .wrap { max-width: 1120px; margin: 0 auto; padding-inline: clamp(16px, 4vw, 40px); }
    a { color: inherit; text-decoration: none; }
    /* Header */
    header.site { background: var(--surface); border-bottom: 1px solid var(--border); }
    header.site .wrap { display: flex; align-items: center; justify-content: space-between; height: 60px; gap: 20px; }
    .brand { display: flex; align-items: center; gap: 10px; }
    .brand .badge { width: 34px; height: 34px; border-radius: 50%; object-fit: cover; }
    .brand .wordmark { display: flex; flex-direction: column; }
    .brand .zh { font-family: var(--font-display); font-size: 15px; font-weight: 700; }
    .brand .en { font-family: var(--font-en); font-style: italic; font-size: 10px; letter-spacing: 0.18em; color: var(--muted); text-transform: uppercase; }
    /* Success page */
    .success-page { flex: 1; display: flex; align-items: center; justify-content: center; padding: clamp(40px, 8vw, 80px) 16px; }
    .success-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-card); box-shadow: var(--shadow-soft); padding: clamp(36px, 5vw, 60px) clamp(24px, 5vw, 60px); max-width: 560px; width: 100%; text-align: center; animation: fade-up .5s .1s ease both; }
    .check-circle { width: 80px; height: 80px; border-radius: 50%; background: var(--primary-soft); display: flex; align-items: center; justify-content: center; margin: 0 auto 24px; animation: circle-pop .5s cubic-bezier(.175,.885,.32,1.275) both; }
    .check-circle svg { overflow: visible; }
    .check-circle .check-path { stroke-dasharray: 80; stroke-dashoffset: 80; animation: check-draw .5s .35s cubic-bezier(.22,1,.36,1) forwards; }
    .success-tag { display: inline-block; background: oklch(91% 0.06 145); color: oklch(35% 0.1 145); font-size: 12px; font-weight: 500; padding: 4px 12px; border-radius: var(--radius-pill); margin-bottom: 14px; }
    .success-card h1 { font-family: var(--font-display); font-size: clamp(22px, 4vw, 28px); margin-bottom: 10px; }
    .success-card .lede { font-size: 14px; color: var(--muted); line-height: 1.8; margin-bottom: 28px; }
    .order-detail { background: var(--bg); border-radius: 12px; padding: 20px 24px; text-align: left; margin-bottom: 28px; }
    .od-row { display: flex; justify-content: space-between; align-items: flex-start; padding-block: 8px; font-size: 14px; gap: 12px; border-bottom: 1px dashed var(--border); }
    .od-row:last-child { border-bottom: none; }
    .od-label { color: var(--muted); font-size: 12px; white-space: nowrap; }
    .od-value { font-weight: 500; text-align: right; overflow-wrap: break-word; word-break: normal; }
    .btn-row { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; }
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 12px 26px; border: none; border-radius: var(--radius-pill); font-family: var(--font-body); font-size: 14px; font-weight: 500; cursor: pointer; transition: all .18s ease; text-decoration: none; }
    .btn-accent { background: var(--accent); color: white; }
    .btn-accent:hover { background: var(--accent-deep); transform: translateY(-1px); box-shadow: 0 4px 16px oklch(69% 0.166 51 / 0.3); }
    .btn-ghost { background: none; border: 1.5px solid var(--border); color: var(--muted); }
    .btn-ghost:hover { border-color: var(--primary); color: var(--primary); }
    .confetti-bar { margin-top: 24px; font-size: 11px; color: var(--muted); letter-spacing: .05em; }
    /* Footer */
    footer.site { background: var(--primary-deep); color: white; margin-top: auto; }
    footer.site .wrap { display: flex; align-items: center; justify-content: space-between; padding-block: 20px; gap: 20px; flex-wrap: wrap; }
    footer.site .f-brand { display: flex; align-items: center; gap: 10px; }
    footer.site .f-brand .badge { width: 36px; height: 36px; }
    footer.site .f-brand .zh { font-family: var(--font-display); font-weight: 700; font-size: 16px; }
    footer.site .copy { font-size: 11px; color: oklch(92% 0.018 287 / 0.6); }
    /* Tabbar */
    .tabbar { position: fixed; bottom: 0; left: 0; right: 0; z-index: 50; display: none; background: oklch(100% 0 0 / 0.94); backdrop-filter: blur(16px) saturate(1.2); border-top: 1px solid var(--border); padding: 4px 8px calc(4px + env(safe-area-inset-bottom)); }
    .tabbar ul { display: flex; justify-content: space-around; }
    .tabbar li { flex: 1; }
    .tabbar li a { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 6px 4px; font-size: 11px; color: var(--muted); text-decoration: none; transition: color .15s ease; }
    .tabbar li.is-active a { color: var(--primary); font-weight: 500; }
    .tabbar li a svg { width: 22px; height: 22px; }
    @media (max-width: 640px) { .tabbar { display: block; } body { padding-bottom: 60px; } }
  </style>
</head>
<body>

  <header class="site">
    <div class="wrap">
      <a href="index.html" class="brand">
        <img class="badge" src="images/logo-mark.webp" alt="肌肉淡菜 Muscles Mussels">
        <span class="wordmark"><span class="zh">肌肉淡菜</span><span class="en">Muscles Mussels</span></span>
      </a>
    </div>
  </header>

  <main class="success-page">
    <div class="success-card">
      <div class="check-circle">
        <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
          <path class="check-path" d="M10 20 L17 28 L30 14" stroke="var(--primary)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="success-tag">訂單已成立</div>
      <h1>感謝您的訂購！</h1>
      <p class="lede">馬祖現流海鮮已安排備貨，<br>確認通知將寄送至您的電子信箱。</p>

      <div class="order-detail">
        <div class="od-row">
          <span class="od-label">訂單編號</span>
          <span class="od-value" id="order-num">MM-20260611-0234</span>
        </div>
        <div class="od-row">
          <span class="od-label">訂單金額</span>
          <span class="od-value" style="color:var(--accent); font-size:16px;">$3,720</span>
        </div>
        <div class="od-row">
          <span class="od-label">付款方式</span>
          <span class="od-value" id="pay-method-display">信用卡</span>
        </div>
        <div class="od-row">
          <span class="od-label">預計出貨</span>
          <span class="od-value" id="ship-estimate">1–2 個工作天・冷鏈直送到府</span>
        </div>
        <div class="od-row">
          <span class="od-label">需要協助？</span>
          <span class="od-value"><a href="mailto:hello@musclesmussels.com" style="color:var(--primary)">hello@musclesmussels.com</a></span>
        </div>
      </div>

      <div class="btn-row">
        <a href="orders.html" class="btn btn-ghost">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
          查看訂單
        </a>
        <a href="index.html" class="btn btn-accent">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 11l8-7 8 7"/><path d="M5 9v10a1 1 0 0 0 1 1h4v-5h4v5h4a1 1 0 0 0 1-1V9"/></svg>
          繼續購物
        </a>
      </div>

      <p class="confetti-bar">馬祖高登海域 · 每批次皆附養殖溯源報告</p>
    </div>
  </main>

  <footer class="site">
    <div class="wrap">
      <div class="f-brand">
        <img class="badge" src="images/logo-mark.webp" alt="" aria-hidden="true">
        <span><span class="zh" style="display:block">肌肉淡菜</span><span class="en" style="font-family:var(--font-en); font-style:italic; font-size:10px; letter-spacing:.18em; text-transform:uppercase; color:oklch(92% 0.018 287 / 0.6)">Muscles Mussels</span></span>
      </div>
      <span class="copy">© 2026 肌肉淡菜 Muscles Mussels · 馬祖高登海域 領有執照合法淡菜養殖場</span>
    </div>
  </footer>

  <nav class="tabbar" aria-label="主要功能">
    <ul>
      <li class="is-active"><a href="index.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M4 11l8-7 8 7v9a1 1 0 0 1-1 1h-4v-6H9v6H5a1 1 0 0 1-1-1z"/></svg>商品</a></li>
      <li><a href="index.html#search"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>搜尋</a></li>
      <li><a href="cart.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M3 4h2l2.4 12.4a2 2 0 0 0 2 1.6h8.6a2 2 0 0 0 2-1.6L22 8H6"/><circle cx="9" cy="20" r="1.4"/><circle cx="18" cy="20" r="1.4"/></svg>購物車</a></li>
      <li><a href="account.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>我的</a></li>
    </ul>
  </nav>

<script>
  // Generate a unique order number based on today's date
  const now = new Date();
  const pad = n => String(n).padStart(2, '0');
  const dateStr = `${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}`;
  const seq = String(Math.floor(Math.random() * 9000) + 1000);
  document.getElementById('order-num').textContent = `MM-${dateStr}-${seq}`;

  // Page exit transitions
  document.querySelectorAll('a[href]').forEach(a => {
    const href = a.getAttribute('href');
    if (!href.startsWith('#') && !href.startsWith('mailto')) {
      a.addEventListener('click', e => {
        e.preventDefault();
        document.body.classList.add('is-leaving');
        setTimeout(() => { window.location.href = href; }, 200);
      });
    }
  });
</script>
</body>
</html>
